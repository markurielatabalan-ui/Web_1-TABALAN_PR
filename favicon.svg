<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="modernGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3" flood-color="#00d4ff"/>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="200" height="200" fill="#0f1419"/>
  
  <!-- Modern book design with rounded corners -->
  <g filter="url(#shadow)">
    <!-- Left page -->
    <rect x="50" y="40" width="55" height="120" rx="8" ry="8" fill="#00d4ff" opacity="0.9"/>
    
    <!-- Right page -->
    <rect x="95" y="40" width="55" height="120" rx="8" ry="8" fill="url(#modernGrad)" opacity="0.9"/>
    
    <!-- Book spine (center) -->
    <rect x="92" y="40" width="6" height="120" fill="#00ff88"/>
  </g>
  
  <!-- Reading lines on pages - modern aesthetic -->
  <line x1="62" y1="60" x2="92" y2="60" stroke="#0f1419" stroke-width="2" opacity="0.6"/>
  <line x1="62" y1="75" x2="92" y2="75" stroke="#0f1419" stroke-width="1.5" opacity="0.5"/>
  <line x1="62" y1="88" x2="92" y2="88" stroke="#0f1419" stroke-width="1.5" opacity="0.5"/>
  
  <line x1="103" y1="60" x2="138" y2="60" stroke="#0f1419" stroke-width="2" opacity="0.6"/>
  <line x1="103" y1="75" x2="138" y2="75" stroke="#0f1419" stroke-width="1.5" opacity="0.5"/>
  <line x1="103" y1="88" x2="138" y2="88" stroke="#0f1419" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Accent circle at bottom (modern touch) -->
  <circle cx="100" cy="170" r="12" fill="none" stroke="url(#modernGrad)" stroke-width="2.5"/>
</svg>